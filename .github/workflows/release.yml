name: Release to NPM

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Get NPM tag from package version
        id: npm_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="latest"
          if [[ $VERSION == *"alpha"* ]]; then
            TAG="alpha"
          elif [[ $VERSION == *"beta"* ]]; then
            TAG="beta"
          elif [[ $VERSION == *"rc"* ]]; then
            TAG="rc"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to NPM
        run: npm publish --tag ${{ steps.npm_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(steps.npm_tag.outputs.tag, 'alpha') || contains(steps.npm_tag.outputs.tag, 'beta') || contains(steps.npm_tag.outputs.tag, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
